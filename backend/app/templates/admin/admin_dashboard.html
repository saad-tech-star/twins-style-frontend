<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Boutique</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }

    /* LOGIN */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff; border: 1px solid #e5e5e5; border-radius: 12px;
      padding: 2rem; width: 100%; max-width: 380px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
    .login-logo .icon { width: 40px; height: 40px; background: #534AB7; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .login-logo h1 { font-size: 18px; font-weight: 600; }
    .login-logo p  { font-size: 13px; color: #666; }
    label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; margin-top: 12px; }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; outline: none; transition: border 0.2s;
    }
    input:focus { border-color: #534AB7; }
    .btn-login {
      margin-top: 1.25rem; width: 100%; padding: 11px; background: #534AB7; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 500;
    }
    .btn-login:hover { background: #3C3489; }
    .error-msg { font-size: 13px; color: #c0392b; margin-top: 8px; display: none; }

    /* DASHBOARD */
    #dashboard { display: none; }
    .topbar {
      background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between; height: 60px;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-left .dot { width: 32px; height: 32px; background: #534AB7; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
    .topbar-left span { font-weight: 600; font-size: 16px; }
    .btn-logout {
      background: none; border: 1px solid #ddd; border-radius: 8px; padding: 6px 14px;
      font-size: 13px; cursor: pointer; color: #555;
    }
    .btn-logout:hover { background: #f5f4f0; }

    .main { padding: 2rem; max-width: 1000px; margin: 0 auto; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .stat-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 1rem 1.25rem; }
    .stat-card .label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .stat-card .value { font-size: 26px; font-weight: 600; }
    .val-attente { color: #B45309; }
    .val-confirme { color: #3C3489; }
    .val-livre    { color: #166534; }
    .val-total    { color: #1a1a1a; }

    /* FILTRES */
    .filters { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 16px; border: 1px solid #ddd; border-radius: 20px; background: #fff;
      font-size: 13px; cursor: pointer; transition: all 0.15s;
    }
    .filter-btn.active { background: #534AB7; color: #fff; border-color: #534AB7; }

    /* COMMANDES */
    .order-card {
      background: #fff; border: 1px solid #e5e5e5; border-radius: 10px;
      padding: 1rem 1.25rem; margin-bottom: 10px;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    }
    .order-id   { font-size: 12px; color: #888; margin-bottom: 4px; }
    .order-name { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
    .order-info { font-size: 13px; color: #555; margin-bottom: 2px; }
    .badge {
      display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 20px; margin-bottom: 6px;
    }
    .badge-attente  { background: #FEF3C7; color: #92400E; }
    .badge-confirme { background: #EDE9FE; color: #4C1D95; }
    .badge-livre    { background: #DCFCE7; color: #14532D; }

    .status-select {
      font-size: 13px; padding: 6px 10px; border: 1px solid #ddd; border-radius: 8px;
      background: #fff; cursor: pointer; outline: none;
    }
    .status-select:focus { border-color: #534AB7; }

    .empty { text-align: center; color: #888; padding: 3rem 0; font-size: 14px; }
    .loading { text-align: center; color: #888; padding: 2rem 0; font-size: 14px; }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .main { padding: 1rem; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">👗</div>
      <div>
        <h1>Espace Admin</h1>
        <p>Boutique Twins</p>
      </div>
    </div>
    <label>Email</label>
    <input type="email" id="email" placeholder="admin@boutique.com" />
    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••" />
    <p class="error-msg" id="error-msg">Email ou mot de passe incorrect.</p>
    <button class="btn-login" onclick="login()">Se connecter</button>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <div class="dot">👗</div>
      <span>Twins — Admin</span>
    </div>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
  </div>

  <div class="main">
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Total commandes</div><div class="value val-total" id="stat-total">—</div></div>
      <div class="stat-card"><div class="label">En attente</div><div class="value val-attente" id="stat-attente">—</div></div>
      <div class="stat-card"><div class="label">Confirmées</div><div class="value val-confirme" id="stat-confirme">—</div></div>
      <div class="stat-card"><div class="label">Livrées</div><div class="value val-livre" id="stat-livre">—</div></div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('tous', this)">Toutes</button>
      <button class="filter-btn" onclick="setFilter('en attente', this)">En attente</button>
      <button class="filter-btn" onclick="setFilter('confirmé', this)">Confirmées</button>
      <button class="filter-btn" onclick="setFilter('livré', this)">Livrées</button>
    </div>

    <div id="orders-container"><p class="loading">Chargement...</p></div>
  </div>
</div>

<script>
  const API = 'http://localhost:5000/api/admin';
  let token = localStorage.getItem('admin_token');
  let currentFilter = 'tous';

  // ─── AUTH ──────────────────────────────────────────
  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('error-msg');
    errEl.style.display = 'none';

    try {
      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) { errEl.style.display = 'block'; return; }
      token = data.token;
      localStorage.setItem('admin_token', token);
      showDashboard();
    } catch {
      errEl.textContent = 'Erreur serveur. Vérifiez que le backend tourne.';
      errEl.style.display = 'block';
    }
  }

  function logout() {
    localStorage.removeItem('admin_token');
    token = null;
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('password').value = '';
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadStats();
    loadOrders();
  }

  // ─── STATS ─────────────────────────────────────────
  async function loadStats() {
    try {
      const res  = await fetch(`${API}/stats`, { headers: authHeader() });
      const data = await res.json();
      document.getElementById('stat-total').textContent   = data.total;
      document.getElementById('stat-attente').textContent = data.en_attente;
      document.getElementById('stat-confirme').textContent = data.confirme;
      document.getElementById('stat-livre').textContent   = data.livre;
    } catch {}
  }

  // ─── COMMANDES ─────────────────────────────────────
  async function loadOrders() {
    const container = document.getElementById('orders-container');
    container.innerHTML = '<p class="loading">Chargement...</p>';
    const url = currentFilter === 'tous'
      ? `${API}/orders`
      : `${API}/orders?statut=${encodeURIComponent(currentFilter)}`;
    try {
      const res    = await fetch(url, { headers: authHeader() });
      const orders = await res.json();
      if (!orders.length) {
        container.innerHTML = '<p class="empty">Aucune commande dans cette catégorie.</p>';
        return;
      }
      container.innerHTML = orders.map(renderOrder).join('');
    } catch {
      container.innerHTML = '<p class="empty">Erreur de chargement.</p>';
    }
  }

  function renderOrder(o) {
    const badgeClass = o.statut === 'en attente' ? 'badge-attente'
                     : o.statut === 'confirmé'   ? 'badge-confirme'
                     : 'badge-livre';
    return `
      <div class="order-card">
        <div>
          <div class="order-id">CMD-${String(o.id).padStart(3,'0')} &nbsp;·&nbsp; ${o.created_at}</div>
          <span class="badge ${badgeClass}">${o.statut}</span>
          <div class="order-name">${o.client}</div>
          <div class="order-info">📱 ${o.phone}</div>
          <div class="order-info">🛍 ${o.produit}${o.taille ? ' — ' + o.taille : ''}${o.couleur ? ' — ' + o.couleur : ''}</div>
          <div class="order-info" style="font-weight:600; color:#1a1a1a; margin-top:4px;">${o.prix} MAD</div>
          ${o.adresse ? `<div class="order-info">📍 ${o.adresse}</div>` : ''}
        </div>
        <div>
          <label style="font-size:12px; color:#888; display:block; margin-bottom:4px;">Changer le statut</label>
          <select class="status-select" onchange="updateStatut(${o.id}, this.value)">
            <option value="en attente" ${o.statut==='en attente'?'selected':''}>En attente</option>
            <option value="confirmé"   ${o.statut==='confirmé'?'selected':''}>Confirmé</option>
            <option value="livré"      ${o.statut==='livré'?'selected':''}>Livré</option>
          </select>
        </div>
      </div>`;
  }

  async function updateStatut(id, statut) {
    await fetch(`${API}/orders/${id}/statut`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', ...authHeader() },
      body: JSON.stringify({ statut })
    });
    loadStats();
    loadOrders();
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadOrders();
  }

  function authHeader() {
    return { 'Authorization': `Bearer ${token}` };
  }

  // ─── AUTO-LOGIN si token existant ──────────────────
  document.addEventListener('DOMContentLoaded', () => {
    if (token) showDashboard();
  });

  document.getElementById('password')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
